<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ML Price Predictor</title>

</head>

<body>

<div class="container">
    <h2>📊 Предсказание цены</h2>

    <div class="description">
        Введите известные параметры закупки, и модель оценит ожидаемое снижение цены и итоговую стоимость контракта на основе исторических данных о торгах.
    </div>

    <!-- Цена -->
    <label for="price">Начальная цена (руб)</label>
    <input id="price" type="number" placeholder="Введите начальную цену" />

    <!-- Регион -->
    <label for="region">Регион проведения закупки</label>
    <select id="region">
        <option>Москва</option>
        <option>Санкт-Петербург</option>
        <option>Московская область</option>
        <option>Ленинградская область</option>
        <option>Новосибирская область</option>
        <option>Свердловская область</option>
        <option>Республика Татарстан</option>
        <option>Краснодарский край</option>
        <option>Другой регион</option>
    </select>

    <!-- Торговая площадка -->
    <label for="platform">Торговая площадка</label>
<select id="platform">
    <option value="">Не выбрано</option>
    <option>ЕЭТП (РОСЭЛТОРГ)</option>
    <option>ЭТП ГПБ</option>
    <option>ЭТП ТЭК-Торг</option>
    <option>Фабрикант</option>
    <option>Сбербанк-АСТ</option>
    <option>РТС-тендер</option>
    <option>РАД Lot-online</option>
    <option>ZAKAZRF</option>
</select>

    <!-- Тип торгов -->
    <label for="trade">Тип торгов</label>
    <select id="trade">
        <option>Аукцион</option>
        <option>Конкурс</option>
    </select>

    <!-- Формат -->
    <label for="mode">Формат торгов</label>
    <select id="mode">
        <option value="">Не указано</option>
        <option>Электронный</option>
    </select>

    <button onclick="predict()">Предсказать</button>

    <div id="result" class="result" style="display:none;"></div>
</div>

<script src="script.js"></script>

</body>
</html>
