<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ML Price Predictor</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">
    <h2>📊 Предсказание цены</h2>

    <div class="description">
        Введите известные параметры закупки, и модель оценит ожидаемое снижение цены и итоговую стоимость контракта на основе исторических данных о торгах.
    </div>

    <!-- Цена -->
    <label for="price">Начальная цена (руб)</label>
    <input id="price" type="number" placeholder="Введите начальную цену" />

    <!-- Регион -->
    <label for="region">Регион проведения закупки</label>
    <select id="region">
        <option>Москва</option>
        <option>Санкт-Петербург</option>
        <option>Московская область</option>
        <option>Ленинградская область</option>
        <option>Новосибирская область</option>
        <option>Свердловская область</option>
        <option>Республика Татарстан</option>
        <option>Краснодарский край</option>
        <option>Другой регион</option>
    </select>

    <!-- Торговая площадка -->
    <label for="platform">Торговая площадка</label>
<select id="platform">
    <option value="">Не выбрано</option>
    <option>ЕЭТП (РОСЭЛТОРГ)</option>
    <option>ЭТП ГПБ</option>
    <option>ЭТП ТЭК-Торг</option>
    <option>Фабрикант</option>
    <option>Сбербанк-АСТ</option>
    <option>РТС-тендер</option>
    <option>РАД Lot-online</option>
    <option>ZAKAZRF</option>
</select>

    <!-- Тип торгов -->
    <label for="trade">Тип торгов</label>
    <select id="trade">
        <option>Аукцион</option>
        <option>Конкурс</option>
    </select>

    <!-- Формат -->
    <label for="mode">Формат торгов</label>
    <select id="mode">
        <option value="">Не указано</option>
        <option>Электронный</option>
    </select>

<!-- Отрасль -->
<label for="industry">Отрасль закупки</label>
<input list="industry_list" id="industry" placeholder="Начните вводить..." />

<datalist id="industry_list">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [КТРУ 42.11.10.130-00000022] Ограждение дорожное удерживающее боковое для автомобилей">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [КТРУ 42.11.10.130-00000021] Ограждение дорожное для пешеходов, [КТРУ 42.11.10.130-00000022] Ограждение дорожное удерживающее боковое для автомобилей">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [КТРУ 42.11.10.130-00000022] Ограждение дорожное удерживающее боковое для автомобилей, [КТРУ 42.11.10.130-00000021] Ограждение дорожное для пешеходов">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [КТРУ 42.11.20.200-00000001] Выполнение работ по ремонту автомобильных дорог">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [ОКВЭД2 42.11] Строительство автомобильных дорог и автомагистралей">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [ОКПД2 27.11] Электродвигатели, генераторы и трансформаторы">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [ОКПД2 43.21] Работы электромонтажные, [ОКПД2 81.29] Услуги по чистке и уборке прочие">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [ОКПД2 25.99] Металлоизделия готовые прочие, не включенные в другие группировки, [ОКПД2 42.99] Сооружения и строительные работы по строительству прочих гражданских сооружений, не включенных в другие группировки, [ОКПД2 26.40] Техника бытовая электронная">
<option value="[ОКПД2 25.99] Металлоизделия готовые прочие, не включенные в другие группировки, [ОКПД2 27.90] Оборудование электрическое прочее, [ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [КТРУ 25.99.29.190-00000004] Опора знака дорожного, [КТРУ 25.99.29.190-00000002] Знак дорожный">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [КТРУ 42.11.10.130-00000020] Ограждение дорожное для пешеходов">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [ОКПД2 38.11] Отходы неопасные; услуги по сбору неопасных отходов">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [ОКПД2 25.99] Металлоизделия готовые прочие, не включенные в другие группировки, [КТРУ 25.99.29.190-00000001] Знак дорожный">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [ОКПД2 26.51] Оборудование для измерения, испытаний и навигации">
<option value="[ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей, [ОКПД2 27.90] Оборудование электрическое прочее, [ОКПД2 58.29] Услуги по изданию прочего программного обеспечения, [ОКПД2 26.20] Компьютеры и периферийное оборудование, [ОКПД2 62.09] Услуги в области информационных технологий прочие и компьютерные услуги, [ОКПД2 62.01] Продукты программные и услуги по разработке и тестированию программного обеспечения, [ОКПД2 26.30] Оборудование коммуникационное, [ОКПД2 74.90] Услуги профессиональные, научные и технические, прочие, не включенные в другие группировки">
<option value="[ОКПД2 33.19] Услуги по ремонту прочего оборудования, [ОКПД2 81.29] Услуги по чистке и уборке прочие, [ОКПД2 81.30] Услуги по планировке ландшафта, [ОКПД2 43.12] Работы по подготовке строительной площадки, [ОКПД2 38.22] Услуги по переработке и утилизации опасных отходов, [ОКПД2 37.00] Услуги по водоотведению; шлам сточных вод, [ОКПД2 43.34] Работы малярные и стекольные, [ОКПД2 43.99] Работы строительные специализированные, не включенные в другие группировки, [ОКПД2 43.33] Работы по устройству покрытий полов и облицовке стен, [ОКПД2 81.21] Услуги по общей уборке зданий, [ОКПД2 93.29] Услуги в области развлечений и отдыха прочие, [ОКПД2 38.11] Отходы неопасные; услуги по сбору неопасных отходов, [ОКПД2 42.11] Дороги автомобильные и автомагистрали; строительные работы по строительству автомобильных дорог и автомагистралей">
</datalist>
    
<!-- Флаги -->
<label>Дополнительные параметры</label>

<div class="checkbox-group">
    <label><input type="checkbox" id="is_electronic"> Электронные торги</label>
    <label><input type="checkbox" id="has_bid_security"> Есть обеспечение заявки</label>
    <label><input type="checkbox" id="has_contract_security"> Есть обеспечение контракта</label>
    <label><input type="checkbox" id="has_purchase_code"> Есть код закупки</label>
    <label><input type="checkbox" id="national_regime_flag"> Национальный режим</label>
</div>


    
    <button onclick="predict()">Предсказать</button>

    <div id="result" class="result" style="display:none;"></div>



</div>

<script src="script.js"></script>

</body>
</html>
