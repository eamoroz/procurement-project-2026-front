<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ML Price Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        .description {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            background: #f0f3ff;
            padding: 12px;
            border-radius: 8px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: #333;
        }

        input, select, button {
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        button {
            margin-top: 20px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        button:disabled {
            background: #9ccc9c;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 12px;
            background: #eef;
            border-radius: 8px;
            font-size: 15px;
        }

        .error {
            background: #ffe0e0;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📊 Предсказание цены</h2>

    <div class="description">
        Введите известные параметры закупки, и модель оценит ожидаемое снижение цены и итоговую стоимость контракта на основе исторических данных о торгах.
    </div>

    <!-- Цена -->
    <label for="price">Начальная цена (руб)</label>
    <input id="price" type="number" placeholder="Введите начальную цену" />

    <!-- Регион -->
    <label for="region">Регион проведения закупки</label>
    <select id="region">
        <option>Москва</option>
        <option>Санкт-Петербург</option>
        <option>Московская область</option>
        <option>Ленинградская область</option>
        <option>Новосибирская область</option>
        <option>Свердловская область</option>
        <option>Республика Татарстан</option>
        <option>Краснодарский край</option>
        <option>Другой регион</option>
    </select>

    <!-- Торговая площадка -->
    <label for="platform">Торговая площадка</label>
<select id="platform">
    <option value="">Не выбрано</option>
    <option>ЕЭТП (РОСЭЛТОРГ)</option>
    <option>ЭТП ГПБ</option>
    <option>ЭТП ТЭК-Торг</option>
    <option>Фабрикант</option>
    <option>Сбербанк-АСТ</option>
    <option>РТС-тендер</option>
    <option>РАД Lot-online</option>
    <option>ZAKAZRF</option>
</select>

    <!-- Тип торгов -->
    <label for="trade">Тип торгов</label>
    <select id="trade">
        <option>Аукцион</option>
        <option>Конкурс</option>
    </select>

    <!-- Формат -->
    <label for="mode">Формат торгов</label>
    <select id="mode">
        <option value="">Не указано</option>
        <option>Электронный</option>
    </select>

    <button onclick="predict()">Предсказать</button>

    <div id="result" class="result" style="display:none;"></div>
</div>

<script>
async function predict() {
    const resultDiv = document.getElementById("result");
    const btn = document.querySelector("button");

    const price = document.getElementById("price").value;

    if (!price) {
        resultDiv.className = "result error";
        resultDiv.innerHTML = "Введите цену";
        resultDiv.style.display = "block";
        return;
    }

    const data = {
        customer_price_rub: parseFloat(price),
        delivery_region: document.getElementById("region").value,
        trade_type: document.getElementById("trade").value,
        electronic_trade_mode: document.getElementById("mode").value || null,
        trading_platform: document.getElementById("platform").value || null
    };

    try {
        btn.disabled = true;

        resultDiv.className = "result";
        resultDiv.innerHTML = "⏳ Считаем...";
        resultDiv.style.display = "block";

        const response = await fetch("https://project-2026-ekaterina-moroz.amvera.io/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const res = await response.json();

        if (res.error) {
            resultDiv.className = "result error";
            resultDiv.innerHTML = "Ошибка: " + res.error;
        } else {
            const drop = res.predicted_drop_pct * 100;

            let interpretation = "";

            if (drop > 25) {
                interpretation = "⚠️ Прогнозируется значительное снижение цены. Рекомендуется обратить внимание: это может быть признаком агрессивного демпинга.";
            } else {
                interpretation = "✅ Ожидаемое снижение находится в умеренном диапазоне и соответствует типичной динамике торгов.";
            }

            resultDiv.className = "result";
            resultDiv.innerHTML = `
                🔻 Снижение: ${drop.toFixed(2)}% <br>
                💰 Итоговая цена: ${res.predicted_final_price.toLocaleString("ru-RU")} ₽ <br><br>
                ${interpretation}
            `;
        }

    } catch (err) {
        resultDiv.className = "result error";
        resultDiv.innerHTML = "Ошибка запроса: " + err;
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
