<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ML Price Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input, select, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            background: #eef;
            border-radius: 8px;
        }

        .error {
            background: #ffe0e0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Предсказание цены</h2>

    <input id="price" type="number" placeholder="Цена (руб)" />

    <select id="region">
        <option>Москва</option>
        <option>Санкт-Петербург</option>
        <option>Другой</option>
    </select>

    <select id="trade">
        <option>Аукцион</option>
        <option>Конкурс</option>
    </select>

    <select id="mode">
        <option value="">Не указано</option>
        <option>Электронный</option>
    </select>

    <button onclick="predict()">Предсказать</button>

    <div id="result" class="result" style="display:none;"></div>
</div>

<script>
async function predict() {
    const resultDiv = document.getElementById("result");

    const data = {
        customer_price_rub: parseFloat(document.getElementById("price").value),
        delivery_region: document.getElementById("region").value,
        trade_type: document.getElementById("trade").value,
        electronic_trade_mode: document.getElementById("mode").value || null
    };

    try {
        const response = await fetch("https://project-2026-ekaterina-moroz.amvera.io/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const res = await response.json();

        if (res.error) {
            resultDiv.className = "result error";
            resultDiv.innerHTML = "Ошибка: " + res.error;
        } else {
            resultDiv.className = "result";
            resultDiv.innerHTML = `
                🔻 Снижение: ${(res.predicted_drop_pct * 100).toFixed(2)}% <br>
                💰 Итоговая цена: ${res.predicted_final_price.toFixed(0)} ₽
            `;
        }

        resultDiv.style.display = "block";

    } catch (err) {
        resultDiv.className = "result error";
        resultDiv.innerHTML = "Ошибка запроса: " + err;
        resultDiv.style.display = "block";
    }
}
</script>

</body>
</html>
